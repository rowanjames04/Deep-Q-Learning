cartpole1:
  env_id: CartPole-v1
  replay_memory_size: 100000
  mini_batch_size: 64
  epsilon_init: 1
  epsilon_decay: 0.9995
  epsilon_min: 0.01
  network_sync_rate: 100
  learning_rate_a: 0.001
  discount_factor_g: 0.99
  stop_on_reward: 100000
  fc1_nodes: 128
  dueling_hidden_dim: 128
  enable_double_dqn: False
  enable_dueling_dqn: True
  # Optional: 'auto' uses CUDA if available else CPU. Set to 'cpu' or 'cuda' to force.
  device: auto
  # Optional: set an integer to seed rng (env, random, numpy, torch) for reproducible runs.
  seed: 42

flappybird1:
  env_id: FlappyBird-v0
  replay_memory_size: 100000
  mini_batch_size: 32
  epsilon_init: 1
  epsilon_decay: 0.99995
  epsilon_min: 0.05
  network_sync_rate: 10
  learning_rate_a: 0.0001
  discount_factor_g: 0.99
  stop_on_reward: 100000
  fc1_nodes: 512
  dueling_hidden_dim: 256
  env_make_params:
    use_lidar: False
  enable_double_dqn: True
  enable_dueling_dqn: True
  device: auto
  seed: 42